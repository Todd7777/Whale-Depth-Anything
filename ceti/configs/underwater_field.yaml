# Real underwater field imagery — CETI curation manifest
# Populated by: bash ceti/scripts/curate_underwater_field.sh

project: CETI_UnderwaterField
data_root: ./data/underwater_field

sources:
  davis_underwater:
    description: DAVIS benchmark clips (dolphins, sea snake) — open-water ROV-like
    videos:
      - assets/examples_video/davis_dolphins.mp4
      - assets/examples_video/davis_seasnake.mp4
    sample_rate: 6
    max_frames_per_video: 200

  submerged3d:
    description: Real deep-sea wreck RGB (Submerged3D, BMVC 2025)
    huggingface: theflash987/Submerged3D

  aqua20:
    description: In-situ marine species imagery under turbidity/low light
    huggingface: taufiktrf/AQUA20
    max_images: 400

  ceti_field:
    description: Project CETI / lab / Dominica field drops (user-provided)
    path: ./data/ceti_field

file_lists:
  train: ./ceti/data/underwater_field_train.txt
  val: ./ceti/data/underwater_field_val.txt
  whale_depth_train: ./ceti/data/whale_depth_train.txt
  whale_depth_val: ./ceti/data/whale_depth_val.txt
