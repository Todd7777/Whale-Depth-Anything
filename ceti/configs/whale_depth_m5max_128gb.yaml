# FINAL — M5 Max 128GB bulletproof fast training (Professor Gil / CETI Track B2)
# Run: bash ceti/scripts/mac_train_bulletproof.sh
#
# Strategy: cache frozen teacher depth ONCE → train student only on MPS (~2× faster/safer)
# Do NOT raise workers above 0 on Mac (causes Killed: 9)

project: CETI_WhaleDepth_M5Max
save_dir: ./checkpoints/ceti_whale_depth

encoder: vitl
pretrained_model: LiheYoung/depth_anything_vitl14
image_size: 518

# Speed (safe on 128GB)
cache_teacher: true
teacher_cache_dir: ./data/teacher_cache/vitl_518
cache_batch_size: 16

epochs: 40
batch_size: 14
workers: 0
val_every: 10

lr: 8.0e-6
encoder_lr: 8.0e-7
weight_decay: 0.01
freeze_encoder: false
use_amp: true
device: mps

w_scale_shift: 1.0
w_gradient: 0.4

preprocess_method: combined
marine_augment: false

train_list: ./ceti/data/whale_depth_train.txt
val_list: ./ceti/data/whale_depth_val.txt

image_sources:
  - ./data/underwater_field/rgb
  - ./data/ceti_field/rgb
  - ./data/whale/raw_frames

val_ratio: 0.12
