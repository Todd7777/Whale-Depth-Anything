# CETI underwater metric depth fine-tuning configuration
# Used by ceti/depth/train_underwater.py

project: CETI_UnderwaterDepth
save_dir: ./checkpoints/ceti

# Depth range for open-ocean / ROV operations (meters)
min_depth: 0.5
max_depth: 25.0

# Training
epochs: 20
batch_size: 8
workers: 4
lr: 0.0001
encoder_lr_factor: 10.0
midas_lr_factor: 10.0

# Input resolution (must be multiple of 14 for ViT patch size)
input_height: 518
input_width: 518

# Augmentation
do_random_rotate: true
degree: 5.0
underwater_augment: true

# Loss weights (SILog from ZoeDepth)
w_si: 1.0
w_grad: 0.5

# Preprocessing
underwater_preprocess: true
preprocess_method: combined  # options: white_balance, clahe, combined, none

# Checkpoints
pretrained_encoder: ./checkpoints/depth_anything_vitl14.pth
pretrained_metric: ./checkpoints/depth_anything_metric_depth_outdoor.pt

datasets:
  flsea:
    data_path: ./data/flsea
    filenames_file: ./ceti/data/flsea_train.txt
    filenames_file_eval: ./ceti/data/flsea_test.txt
    min_depth: 0.5
    max_depth: 20.0

  squid:
    data_path: ./data/squid
    filenames_file: ./ceti/data/squid_train.txt
    filenames_file_eval: ./ceti/data/squid_test.txt
    min_depth: 1.0
    max_depth: 10.0

  ceti_lab:
    data_path: ./data/ceti_lab
    filenames_file: ./ceti/data/ceti_lab_train.txt
    filenames_file_eval: ./ceti/data/ceti_lab_test.txt
    min_depth: 0.3
    max_depth: 15.0
