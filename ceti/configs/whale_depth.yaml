# CETI underwater / marine relative depth fine-tuning
# Real field imagery (see underwater_field.yaml) — not synthetic placeholders

project: CETI_WhaleDepth
save_dir: ./checkpoints/ceti_underwater_field

# Model — M5 Max: vitl + larger batch (override with --encoder vits for quick tests)
encoder: vitl
pretrained_model: LiheYoung/depth_anything_vitl14
image_size: 518

# Training (Apple M5 Max — use whale_depth_m5max_128gb.yaml for 128GB / batch 16)
epochs: 40
batch_size: 8
workers: 8
lr: 8.0e-6
encoder_lr: 8.0e-7
weight_decay: 0.01
freeze_encoder: false
use_amp: true
device: mps

# Loss weights (teacher-student distillation)
w_scale_shift: 1.0
w_gradient: 0.4

# ROV / open-water underwater capture
preprocess_method: combined
marine_augment: true

# File lists from curate_underwater_field.sh
train_list: ./ceti/data/whale_depth_train.txt
val_list: ./ceti/data/whale_depth_val.txt

# Legacy scan paths (used if lists missing)
image_sources:
  - ./data/underwater_field/rgb
  - ./data/ceti_field/rgb
  - ./data/whale/raw_frames

val_ratio: 0.12
