# CETI whale detection training configuration

project: CETI_WhaleDetection
save_dir: ./ceti/checkpoints

# Classes — expand as CETI annotation grows
names:
  0: sperm_whale
  1: whale_surface  # generic surface blow / dorsal
  2: whale_partial  # partially submerged

# Model
model: yolov8m.pt  # base; optionally init from depth-anything backbone via train_whale.py
encoder_backbone: vits  # depth anything encoder for feature init (optional)
img_size: 640
batch_size: 16
epochs: 100
patience: 20

# Optimizer
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

# Augmentation tuned for marine/aerial imagery
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1

# Data paths (YOLO format: images/ + labels/ per split)
train: ./data/whale/yolo/train
val: ./data/whale/yolo/val
test: ./data/whale/yolo/test

# Bootstrap sources (populated by data_curation/download_public.py)
bootstrap:
  beluga5k: ./data/whale/bootstrap/beluga5k
  whales_from_space: ./data/whale/bootstrap/whales_from_space

# Semi-supervised settings
pseudo_label:
  confidence_threshold: 0.85
  min_box_area: 400  # pixels, filter tiny false positives
  human_review_required: true

# AVATARS integration thresholds
avatars:
  min_detection_confidence: 0.6
  rendezvous_depth_max_m: 50.0
  surface_only_classes: [0, 1, 2]
