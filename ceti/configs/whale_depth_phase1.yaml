# Phase 1: large public underwater RGB bootstrap (before CETI field bulk)
# Mac M5 Max: bash ceti/scripts/download_all_online_data.sh && bash ceti/scripts/run_phase1_train.sh

project: CETI_Phase1_OnlineBootstrap
save_dir: ./checkpoints/ceti_phase1_online

encoder: vitl
pretrained_model: LiheYoung/depth_anything_vitl14
image_size: 518

epochs: 30
batch_size: 16
workers: 10
lr: 8.0e-6
encoder_lr: 8.0e-7
weight_decay: 0.01
freeze_encoder: false
use_amp: true
device: mps

w_scale_shift: 1.0
w_gradient: 0.4

preprocess_method: combined
marine_augment: true

train_list: ./ceti/data/whale_depth_train.txt
val_list: ./ceti/data/whale_depth_val.txt
